<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxel Craft</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="overlay">
      <h1>Voxel Craft</h1>
      <p>Кликните, чтобы начать</p>
      <ul>
        <li><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> — движение</li>
        <li><kbd>Пробел</kbd> — прыжок</li>
        <li><kbd>Shift</kbd> — бег</li>
        <li>Мышь — обзор</li>
        <li><kbd>ЛКМ</kbd> — сломать блок</li>
        <li><kbd>Esc</kbd> — выйти из режима игры</li>
      </ul>
    </div>
    <div id="crosshair" aria-hidden="true"></div>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
